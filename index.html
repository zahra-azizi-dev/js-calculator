<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="stylesheet/master.css">
    <link rel="stylesheet" href="stylesheet/out.css">



</head>

<body class=" min-h-screen bg-gradient-to-tr  flex justify-center items-center">
    <div class="calculat relative w-full max-w-[420px] gap-2 flex items-center justify-center flex-col h-[555px] rounded-xl   shadow-[20px_20px_30px_rgba(0,0,0,0.3),_-10px_-10px_20px_rgba(255,255,255,0.1)]    shadow-2xl shadow-black/50 
            shadow-inner shadow-white/20">
        <div class="headerCal absolute flex w-full justify-between items-center px-6  mb-[480px] ">
            <button id="themeToggle"
                class="toggle w-[80px] h-10 rounded-full  bg-amber-50 hover:bg-amber-100 transition-all duration-300  flex items-center justify-center shadow-md overflow-hidden">
                <div class="relative w-6 h-6">
                    <div class=" sun  pointer-events-none mx-3  ">
                        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="10" r="5" fill="#FBBF24" stroke="#D97706" stroke-width="0.8" />
                            <path
                                d="M12 3V1M12 23V21M21 10H23M1 10H3M19 5L20.5 3.5M4.5 20.5L6 19M5 5L3.5 3.5M20.5 20.5L19 19"
                                stroke="#FBBF24" stroke-width="1.2" stroke-linecap="round" />
                            <path
                                d="M17.5 15.5C18.5 15.5 19.5 14.8 19.5 13.5C19.5 12.2 18.5 11.5 17.5 11.5C17.5 9.5 15.5 8 13.5 8C11.8 8 10.2 9 9.5 10.5C8.5 10 7 10.5 6.5 11.5C5.5 11.5 4.5 12.5 4.5 14C4.5 15.5 5.5 15.5 6.5 15.5H17.5Z"
                                fill="white" stroke="#9CA3AF" stroke-width="0.6" />
                        </svg>
                    </div>
                    <div class="moon pointer-events-none   ">
                        <svg class=" w-6 h-6" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M12 2C9.2 2 6.5 3.5 5 6C3.5 8.5 3.5 11.5 5 14C6.5 16.5 9.2 18 12 18C9.5 15 9.5 11 12 8C14.5 5 17.5 4 21 4C18.5 2.5 15.3 2 12 2Z"
                                fill="#E2E8F0" stroke="#94A3B8" stroke-width="0.5" />
                            <path d="M17 7L17.4 8.2L18.6 8.6L17.4 9L17 10.2L16.6 9L15.4 8.6L16.6 8.2L17 7Z"
                                fill="#FDE047" />
                            <path d="M19 12L19.2 12.8L20 13L19.2 13.2L19 14L18.8 13.2L18 13L18.8 12.8L19 12Z"
                                fill="#FDE047" />
                            <path d="M14 3L14.2 3.8L15 4L14.2 4.2L14 5L13.8 4.2L13 4L13.8 3.8L14 3Z" fill="#FDE047" />
                            <path d="M21 9L21.1 9.4L21.5 9.5L21.1 9.6L21 10L20.9 9.6L20.5 9.5L20.9 9.4L21 9Z"
                                fill="#FDE047" />
                        </svg>
                    </div>
                </div>
            </button>
            <div class="text-blue-300 relative text-xl font-bold flex items-center gap-2">calculate🧮</div>

        </div>
        <div class="displays w-full px-3  flex flex-col gap-2">
            <div class="screen-group relative">
                <div
                    class="relative  bg-white/30 backdrop-blur-md rounded-2xl shadow-[0_8px_32px_rgba(0,0,0,0.2),inset_0_1px_1px_rgba(255,255,255,0.5)] border border-white/40">
                    <input type="text" id="export" placeholder="0"
                        class="dark:bg-amber-800/40 dark:border-amber-700/30 w-full h-11 px-6 text-right text-4xl font-bold bg-transparent rounded-2xl outline-none text-gray-800 placeholder:text-gray-400 tracking-wider">
                </div>
            </div>
            <div class="screen-group relative mt-1">
                <div
                    class="relative bg-amber-50/40 backdrop-blur-sm rounded-xl shadow-[inset_0_2px_4px_rgba(0,0,0,0.05),0_4px_12px_rgba(0,0,0,0.1)] border border-white/30">
                    <input type="text" id="result" placeholder="Result"
                        class="dark:text-amber-100 w-full  h-11 px-5 text-right text-xl font-mono bg-transparent rounded-xl outline-none text-amber-900">
                </div>
            </div>
        </div>
        <div class="buttons grid grid-cols-4 gap-5 mx-4 *:w-20 *:h-12 flex  justify-center items-center">
            <!-- // ردیف اول// -->
            <button class="clear bg-red-500 hover:bg-red-600 text-white  rounded-xl shadow-md transition-all"
                id="clear">c</button>
            <button class="operator bg-orange-500 hover:bg-orange-600 text-white  rounded-xl shadow-md transition-all"
                id="divide">÷</button>
            <button class="operator bg-orange-500 hover:bg-orange-600 text-white  rounded-xl shadow-md transition-all"
                id="multiply">*</button>
            <button class="backspace bg-orange-500 hover:bg-orange-600 text-white  rounded-xl shadow-md transition-all"
                id="backspace">⌫</button>

            <!-- // ردیف دوم// -->
            <button class="number  bg-amber-100 hover:bg-amber-200 text-amber-900  rounded-xl shadow-md transition-all"
                id="num7">7</button>
            <button class="number  bg-amber-100 hover:bg-amber-200 text-amber-900 rounded-xl shadow-md transition-all"
                id="num8">8</button>
            <button class="number  bg-amber-100 hover:bg-amber-200 text-amber-900  rounded-xl shadow-md transition-all"
                id="num9">9</button>
            <button class="operator bg-orange-500 hover:bg-orange-600 text-white  rounded-xl shadow-md transition-all"
                id="minece">-</button>


            <!-- // ردیف سوم// -->
            <button class="number  bg-amber-100 hover:bg-amber-200 text-amber-900  rounded-xl shadow-md transition-all"
                id="num4">4</button>
            <button class="number  bg-amber-100 hover:bg-amber-200 text-amber-900  rounded-xl shadow-md transition-all"
                id="num5">5</button>
            <button class="number  bg-amber-100 hover:bg-amber-200 text-amber-900 rounded-xl shadow-md transition-all"
                id="num6">6</button>
            <button class="operator bg-orange-500 hover:bg-orange-600 text-white  rounded-xl shadow-md transition-all"
                id="plus">+</button>

            <!-- // ردیف چهارم// -->
            <button
                class="number  bg-amber-100 hover:bg-amber-200 text-amber-900  dark:text-slate-100 rounded-xl shadow-md transition-all"
                id="num1">1</button>
            <button class="number  bg-amber-100 hover:bg-amber-200 text-amber-900  rounded-xl shadow-md transition-all"
                id="num2">2</button>
            <button class="number  bg-amber-100 hover:bg-amber-200 text-amber-900  rounded-xl shadow-md transition-all"
                id="num3">3</button>
            <button class="decimal bg-orange-500 hover:bg-orange-600 text-white  rounded-xl shadow-md transition-all"
                id="dot">.</button>

            <!-- //  ردیف پنجم// -->
            <button
                class="number zero  !w-[190px] !h-12 bg-amber-100 hover:bg-amber-200 text-amber-900  rounded-xl shadow-md transition-all"
                id="num0">0</button>
            <button
                class="equal !w-[200px] !h-12 ml-24 bg-emerald-900 hover:bg-emerald-600 text-white  rounded-xl shadow-md transition-all"
                id="equal" style="grid-column: span 3;">=</button>




        </div>

    </div>

</body>
<script>
    let display = document.querySelector('#export')
    let destiny = document.querySelector('#result')
    let numbers = document.querySelectorAll('.number')
    let operators = document.querySelectorAll('.operator')
    let expression = '';
    let equal = document.querySelector('.equal')
    let decimal = document.querySelector('.decimal')
    let backspace = document.querySelector('.backspace')
    let clear = document.querySelector('.clear')
    numbers.forEach((btn) => {
        btn.addEventListener('click', () => {
            expression += btn.innerText
            display.value = expression
        })
    })

    ///هم پشت  چندعملگر تکرار  از  جلوگیری  و  عملگرها اضافهکردن //
    operators.forEach((op) => {
        op.addEventListener('click', () => {
            const opcar = op.textContent
            if (!expression) {   // نکردی اگرهنوزچیزیتایپ 
                if (opcar === '-') {
                    expression = '-'
                    display.value = expression
                }
                return
            }
            let lastChar = expression[expression.length - 1]
            let isOprator = (lastChar === '+' || lastChar === '-' || lastChar === '*' || lastChar === '÷')
            if (isOprator === false) {
                expression += op.innerText;
                display.value = expression
            }
        })
    })
    // میکند ازتکرارعملگرهاجلوگیری ////
    equal.addEventListener('click', () => {
        let currentnumber = '';
        let tokens = [];

        for (let val of expression) {
            if (val !== '+' && val !== '-' && val !== '*' && val !== '÷') {
                currentnumber += val;
            } else {
                if (currentnumber !== '') {
                    tokens.push(currentnumber);
                }
                tokens.push(val);
                currentnumber = '';
            }
        }

        if (currentnumber !== '') {
            tokens.push(currentnumber);
        }

        /// اولویت///
        let processtoken = [...tokens]; // کلون از آرایه
        for (let i = 0; i < processtoken.length; i++) {
            if (processtoken[i] === '*' || processtoken[i] === '÷') {
                let box = processtoken[i]
                let left = parseFloat(processtoken[i - 1])
                let right = parseFloat(processtoken[i + 1])
                let resualt;
                if (box === '*') {
                    resualt = left * right
                } else {
                    if (right === 0) {
                        display.value = "Error";
                        return
                    }
                    resualt = left / right
                }

                processtoken.splice(i - 1, 2)
                processtoken[i - 1] = resualt.toString()

                i--;

            }
            // جمع و منها/////
            let finalresult = parseFloat(processtoken[0])
            for (let i = 1; i < processtoken.length; i += 2) {
                let amalgar = processtoken[i]
                let adad = parseFloat(processtoken[i + 1])
                if (amalgar === '+') {
                    finalresult += adad
                } else if (amalgar === '-') {
                    finalresult -= adad
                }

            }
            destiny.value = finalresult;


        }
        /// اولویت///
    });

    decimal.addEventListener('click', () => {
        if (expression === '') {
            expression = '0.'
        } else {
            expression += '.'
        }
        display.value = expression;

    })
    backspace.addEventListener('click', () => {
        if (expression) {
            expression = expression.slice(0, expression.length - 1)
            display.value = expression
            result.value = ''
        }
    })
    clear.addEventListener('click', () => {
        expression = ''
        result.value = ''
        display.value = ''
        // addResultAnimation();

    })

    // / setToggle////
    const themeToggle = document.querySelector('#themeToggle')
    const body = document.querySelector('body')
    let theme = localStorage.getItem('theme')
    if (theme === 'dark') {
        body.classList.add('night')
    }

    themeToggle.addEventListener('click', () => {
        body.classList.toggle('night')
        if (body.classList.contains('night')) {
            localStorage.setItem('theme', 'dark')
        } else {
            localStorage.setItem('theme', 'light')
        }

    })
    



</script>

</html>
